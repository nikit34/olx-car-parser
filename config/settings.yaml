# OLX.pt Car Parser Settings

scraper:
  base_url: "https://www.olx.pt/carros-motos-e-barcos/carros/"
  interval_hours: 6
  request_delay_min: 0.7
  request_delay_max: 1.5
  max_pages: 999
  private_only: true
  concurrency: 12

database:
  path: "data/olx_cars.db"

analytics:
  trend_window_days: 30
  buy_signal_threshold: 10

llm:
  # Local Ollama with qwen3:4b-instruct. /api/chat with format=json constrains
  # the model to emit parseable JSON; the system prompt documents the
  # 15-field schema, so no separate tool wrapper is required.
  ollama_model: "qwen3:4b-instruct"
  ollama_url: "http://localhost:11434"
  max_workers: 6     # M1 8 GB tops out around here; raise on bigger boxes
  max_tokens: 600
  max_chars: 4000

alerts:
  telegram_bot_token: "8651422044:AAEf93eodK6d4F7fn1FVH-vh0H5JX-gb92s"
  telegram_chat_id: "604665081"
  min_discount_pct: 15
  state_file: "data/alerts_state.json"

logging:
  level: "INFO"
  file: "data/parser.log"
