# OLX.pt Car Parser Settings

scraper:
  base_url: "https://www.olx.pt/carros-motos-e-barcos/carros/"
  interval_hours: 6
  request_delay_min: 0.7
  request_delay_max: 1.5
  # 200 covers OLX's full active inventory with margin (typical depth ≈
  # 150 pages). The actual loop terminates earlier via the known-ids
  # early-stop in scrape_all when the deep pages become mostly revisits —
  # ~30 pages on a steady-state DB.
  max_pages: 200
  private_only: true
  # Detail-page fetch concurrency. 16 is a conservative bump from 12 — the
  # log showed only 2 EAGAIN events per 4h, so headroom exists. Higher
  # values (20+) start hitting OLX's per-IP soft rate limit and trigger
  # the 403 backoff in scraper.py:140. Bumping further only pays off
  # paired with a residential-proxy rotation, which we don't have.
  concurrency: 16

database:
  path: "data/olx_cars.db"

analytics:
  trend_window_days: 30
  buy_signal_threshold: 10

llm:
  # Local Ollama with qwen3:4b-instruct. /api/chat with format=json constrains
  # the model to emit parseable JSON; the system prompt documents the
  # 15-field schema, so no separate tool wrapper is required.
  ollama_model: "qwen3:4b-instruct"
  # Production inference pool — both hosts handle traffic in parallel
  # via sticky-per-thread round-robin in _pick_ollama_url(). The dev Mac
  # is intentionally NOT in this list; it orchestrates but never inferences.
  # Both hosts must run Ollama with OLLAMA_HOST=0.0.0.0 so they're LAN-reachable.
  #   192.168.1.77 — MacBook Air M1, 8 GB (the GH-Actions scraper itself)
  #   192.168.1.69 — Windows, 16 GB (LAN partner; 7B+ headroom)
  ollama_urls:
    - "http://192.168.1.77:11434"
    - "http://192.168.1.69:11434"
  # Legacy single-URL field kept for back-compat; ignored if ollama_urls is set.
  ollama_url: "http://192.168.1.77:11434"
  # Server slots: .77 NUM_PARALLEL=2 (3 OOMs Metal at 4096 ctx on M1 Air 8GB
  # → Ollama silently caps ctx to 1536, head of system prompt gets truncated).
  # .69 must stay at NUM_PARALLEL=1 — its MX230 has only 4 GB VRAM, and
  # NUM_PARALLEL=2 forces KvSize=8192 which trips "failure during GPU
  # discovery" (CUDA discovery timeout) under load. Verified empirically
  # 2026-04-28: 10 consecutive runner-start failures, model never loaded.
  # Two workers oversubscribing one slot on .69 still fine — Ollama queues
  # the second request internally.
  max_workers: 6
  # Weight per backend host (substring match against ollama_urls). Repeats
  # the URL in the assignment pool, so weight=2 gets twice as many sticky
  # workers as weight=1. With max_workers=6 and 2:1, we land at 4 workers
  # on .77 (2 slots × 2 oversub) and 2 on .69 (1 slot × 2 oversub). The
  # 2 oversub per slot smooths over individual call latency variance.
  ollama_weights:
    "192.168.1.77": 2
    "192.168.1.69": 1
  max_tokens: 300    # 15-field JSON ≈ 230 tokens; 300 leaves slack and
                     # caps "model looping" failures within ~3 s wall time
  # Trimmed from 4000 → 2500 to fit a tighter num_ctx (below). Real ads
  # are ≤2500 chars in 99%+ of cases; longer ones get truncated at the
  # tail (which is usually contact details / boilerplate, not features).
  max_chars: 2500
  # Real measured budget: system≈1582 (few-shot + damage rules + 15 fields),
  # description ≤ ~750 tokens (max_chars 2500 ÷ ~3.3 chars/token pt-PT),
  # reply ≤ 300 → ~2630 tokens. 3072 leaves ~440 tokens of margin and
  # cuts prefill compute ~25 % vs the previous 4096 ctx (no model retrain
  # needed, prompt unchanged so accuracy is unchanged). 2048 was the
  # previous floor that silently dropped the head of the system prompt.
  num_ctx: 3072

alerts:
  telegram_bot_token: "8651422044:AAEf93eodK6d4F7fn1FVH-vh0H5JX-gb92s"
  telegram_chat_id: "604665081"
  min_discount_pct: 15
  state_file: "data/alerts_state.json"

logging:
  level: "INFO"
  file: "data/parser.log"
