# OLX.pt Car Parser Settings

scraper:
  base_url: "https://www.olx.pt/carros-motos-e-barcos/carros/"
  interval_hours: 6
  request_delay_min: 0.7
  request_delay_max: 1.5
  max_pages: 999
  private_only: true
  concurrency: 12

database:
  path: "data/olx_cars.db"

analytics:
  trend_window_days: 30
  buy_signal_threshold: 10

llm:
  # Claude Haiku 4.5 — best price/perf for structured extraction. Tool-use mode
  # guarantees JSON shape, prompt caching makes the system prompt nearly free
  # after the first call in each 5-minute window.
  model: "claude-haiku-4-5"
  max_workers: 16   # network-bound; SDK retries handle the occasional 429
  max_tokens: 600   # 14-field tool call fits in ~350 tokens; 600 leaves slack
  max_chars: 4000   # truncate very long descriptions before sending

alerts:
  telegram_bot_token: "8651422044:AAEf93eodK6d4F7fn1FVH-vh0H5JX-gb92s"
  telegram_chat_id: "604665081"
  min_discount_pct: 15
  state_file: "data/alerts_state.json"

logging:
  level: "INFO"
  file: "data/parser.log"
