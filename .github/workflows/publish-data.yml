name: Publish DB to Release

# Manual trigger only — the remote server uploads directly via API.
# This workflow is a fallback to (re-)create the release tag if needed.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure release tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest-data 2>/dev/null || \
            gh release create latest-data \
              --title "Latest Data" \
              --notes "Auto-updated database from scraper" \
              --latest=false
          echo "Release 'latest-data' is ready."
