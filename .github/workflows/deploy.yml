name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, olx-scraper]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Sync code to server directory
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude 'data' \
            --exclude '.env' \
            --exclude '.DS_Store' \
            --exclude '.claude' \
            --exclude '.cursor' \
            "$GITHUB_WORKSPACE/" /Users/anastasia/olx-car-parser/

      - name: Install dependencies
        run: |
          cd /Users/anastasia/olx-car-parser
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/pip install -q -e .

      - name: Ensure Ollama is installed
        run: |
          MODEL=$(python3 -c "import yaml; print(yaml.safe_load(open('config/settings.yaml'))['llm']['ollama_model'])")
          if curl -sf http://localhost:11434/api/tags 2>/dev/null | grep -q "$MODEL"; then
            echo "Ollama OK with $MODEL"
          else
            echo "Setting up Ollama with $MODEL..."
            bash /Users/anastasia/olx-car-parser/scripts/setup-ollama.sh "$MODEL"
          fi
