name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, olx-scraper]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Sync code to server directory
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude 'data' \
            --exclude '.env' \
            --exclude '.DS_Store' \
            --exclude '.claude' \
            --exclude '.cursor' \
            "$GITHUB_WORKSPACE/" /Users/anastasia/olx-car-parser/

      - name: Install dependencies
        run: |
          cd /Users/anastasia/olx-car-parser
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/pip install -q -e .

      - name: Restart dashboard
        run: |
          PLIST="$HOME/Library/LaunchAgents/com.olx-car-parser.dashboard.plist"
          launchctl bootout gui/$(id -u) "$PLIST" 2>/dev/null || true
          launchctl bootstrap gui/$(id -u) "$PLIST"
          echo "Dashboard restarted on port 8501"
