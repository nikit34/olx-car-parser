name: Scrape OLX

on:
  schedule:
    # Every 4 hours, except 04:00 UTC — 5 shallow + 1 deep at 04:00. The
    # shallow runs hit ~30 pages of "newest first" (early-stop), so deep-tail
    # listings invisible to that window only get last_seen_at + price refresh
    # via the daily deep sweep. Without the split, a listing that sinks past
    # page 30 the day it's posted never has its price re-checked.
    - cron: "0 0,8,12,16,20 * * *"
    # Off-hour minute (xx:37) instead of 04:00 — GitHub silently drops
    # scheduled runs at the top of the hour during peak load (we saw
    # the deep sweep skipped 9 days in a row, May 2 → May 11, while
    # every shallow xx:00 cron also missed occasionally but recovered
    # within 4h). Per GitHub Actions docs: "schedule your workflow to
    # run at a different time of the hour" to reduce delay/skip risk.
    - cron: "37 4 * * *"
  workflow_dispatch:
    inputs:
      with_llm:
        description: "Enable LLM enrichment (start Ollama, enrich inline + final pass)"
        type: boolean
        default: true
      deep:
        description: "Deep sweep (no early-stop, walk all pages — refreshes prices on the stale tail)"
        type: boolean
        default: false

permissions:
  contents: write

# Schedule always runs with LLM; manual trigger respects the input.
# Deep sweep fires on the dedicated 04:00 cron OR when manually requested.
env:
  WITH_LLM: ${{ github.event_name == 'schedule' && 'true' || inputs.with_llm }}
  IS_DEEP: ${{ github.event.schedule == '37 4 * * *' || inputs.deep == 'true' }}

# Single-runner self-hosted setup — only one scrape can hold the SQLite DB
# at a time anyway, so we cancel any in-flight run when a new cron fires
# instead of letting them queue up. Without this, runs were piling up: a
# 6-hour scrape + 8-hour cron interval was barely making it; throw in any
# slowdown and queue depth grew unbounded (we saw queued runs waiting 20+
# hours).
concurrency:
  group: scrape-job
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: [self-hosted, olx-scraper]
    # Lowered from 720 → 240 (4h). With early-stop in scrape_all, the
    # steady-state run is ~20-30 minutes. 4h is generous for a slow LLM
    # day; anything beyond that is stuck.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Link persistent data directory
        run: |
          rm -rf data
          ln -s /Users/anastasia/olx-car-parser/data data

      - name: Set up Python venv
        run: |
          /opt/homebrew/bin/python3.14 -m venv .venv 2>/dev/null || true
          .venv/bin/pip install -q -e .

      - name: Ensure damage classifier weights present
        # Moved to the top of the pipeline so the next step can kick off
        # plate-OCR backfill in background concurrent with Scrape. Weights
        # live in the persistent data/ dir (already symlinked above);
        # steady-state this is a 1-line no-op. First time on a fresh runner
        # pulls them from latest-data release. Missing weights downgrade
        # verify-photos and plate-OCR backfill to no-ops, not a hard fail.
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          if [ -f data/damage_classifier_v2.pt ]; then
            echo "Weights already present at data/damage_classifier_v2.pt"
          else
            gh release download latest-data --pattern damage_classifier_v2.pt --dir data/ \
              || echo "::warning::damage_classifier_v2.pt not in latest-data release; verify-photos + plate-OCR will be skipped"
          fi

      - name: Kick off background plate-OCR backfill
        # Plate-OCR backfill works on legacy rows (photo_damage_p IS NOT NULL
        # AND plate_readable IS NULL) — completely disjoint from listings
        # Scrape is currently writing, so the only shared resource is the
        # SQLite write lock. With --limit 200 at ~30/min the backfill runs
        # ~7 min; scrape's heavy market_stats commit doesn't kick in until
        # the very tail of scrape (~30+ min in on shallow, later on deep),
        # so the lock contention window is small. No Ollama dependency
        # either (cli.py:873 — backfill_plates skips DamageClassifier and
        # uses CLIP + EasyOCR only), so this doesn't fight inline LLM
        # workers for the model pool. The matching "Wait for background
        # plate-OCR backfill" step downstream blocks on the PID and
        # surfaces the log; that step's 30-min timeout backstops a stuck
        # background job.
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Reap any stale process from a previous cancelled run before
          # starting a new one — otherwise two backfills would race on
          # the same rows.
          if [ -f /tmp/plate_backfill.pid ]; then
            OLD_PID=$(cat /tmp/plate_backfill.pid)
            if kill -0 "$OLD_PID" 2>/dev/null; then
              echo "Killing stale plate-OCR PID=$OLD_PID from previous run"
              kill "$OLD_PID" 2>/dev/null || true
              sleep 2
              kill -9 "$OLD_PID" 2>/dev/null || true
            fi
            rm -f /tmp/plate_backfill.pid /tmp/plate_backfill.rc /tmp/plate_backfill.log
          fi
          if [ ! -f data/damage_classifier_v2.pt ]; then
            echo "::warning::Skipping plate-OCR backfill — weights missing"
            exit 0
          fi
          ulimit -n 4096
          nohup bash -c '.venv/bin/python -m src.cli verify-photos --backfill-plates --workers 2 --limit 200 > /tmp/plate_backfill.log 2>&1; echo $? > /tmp/plate_backfill.rc' &
          PID=$!
          echo $PID > /tmp/plate_backfill.pid
          disown
          echo "Background plate-OCR backfill started (PID=$PID, log=/tmp/plate_backfill.log)"

      - name: Ensure Ollama is running
        if: env.WITH_LLM == 'true'
        timeout-minutes: 5
        run: |
          # Settings.yaml points the runner at http://localhost:11434, so
          # any binding that includes 127.0.0.1 (default) works. We no
          # longer wrestle with OLLAMA_HOST=0.0.0.0 — see commit log: the
          # menu-bar app's launchd auto-relaunch lost env vars and the
          # DHCP-assigned IP drifted, both producing EHOSTUNREACH on the
          # old hardcoded 192.168.1.77 URL.
          DESIRED_PARALLEL=2
          launchctl setenv OLLAMA_NUM_PARALLEL "$DESIRED_PARALLEL"
          launchctl setenv OLLAMA_FLASH_ATTENTION 1

          NEEDS_RESTART=0
          if ! curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            NEEDS_RESTART=1
          else
            CURRENT=$(grep -o 'OLLAMA_NUM_PARALLEL:[0-9]*' /tmp/ollama.err.log 2>/dev/null | tail -1 | cut -d: -f2)
            if [ "$CURRENT" != "$DESIRED_PARALLEL" ]; then
              echo "Ollama NUM_PARALLEL=$CURRENT, want $DESIRED_PARALLEL — recycling"
              NEEDS_RESTART=1
            fi
          fi
          if [ "$NEEDS_RESTART" = "1" ]; then
            pkill -9 -f "Ollama.app" 2>/dev/null || true
            pkill -9 -f "ollama serve" 2>/dev/null || true
            sleep 3
            open -a /Applications/Ollama.app 2>/dev/null || true
            for i in $(seq 1 30); do
              curl -sf http://localhost:11434/api/tags >/dev/null 2>&1 && break
              sleep 1
            done
          fi
          if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            PARALLEL=$(grep -o 'OLLAMA_NUM_PARALLEL:[0-9]*' /tmp/ollama.err.log | tail -1 || echo "unknown")
            echo "Ollama is running ($PARALLEL)"
            curl -s http://localhost:11434/api/tags | python3 -c "import sys,json; tags=json.load(sys.stdin); print('Models:', [m['name'] for m in tags.get('models',[])])"
          else
            echo "::error::Ollama failed to start after 30s"
            exit 1
          fi

      - name: Probe LAN partner Ollama (192.168.1.69)
        # Diagnostic-only — sticky routing falls back to localhost if .69
        # is unreachable, so the build keeps moving. Logs the actual
        # network state so the next regression isn't a guessing game:
        # ifconfig (which IP we have on Wi-Fi), netstat -rn (do we have
        # a route to .69's subnet), arp (has .69 ever responded), and
        # finally a curl with verbose output. Runs BEFORE smoke so that
        # if smoke trips, the diagnostic data is already in the log.
        if: env.WITH_LLM == 'true'
        timeout-minutes: 2
        continue-on-error: true
        run: |
          echo "=== runner own IP ==="
          ipconfig getifaddr en0 2>/dev/null || true
          ipconfig getifaddr en1 2>/dev/null || true
          echo "=== route to 192.168.1.69 ==="
          route -n get 192.168.1.69 2>&1 | head -10 || true
          echo "=== ARP cache for 192.168.1.69 ==="
          arp -n 192.168.1.69 2>&1 || true
          echo "=== ping .69 ==="
          ping -c 2 -W 2000 192.168.1.69 2>&1 | head -8 || true
          echo "=== curl Ollama on .69 ==="
          if curl -sf --max-time 5 http://192.168.1.69:11434/api/tags >/dev/null 2>&1; then
            echo "✓ Ollama on 192.168.1.69:11434 reachable"
          else
            echo "::warning::192.168.1.69:11434 unreachable — enrich falls back to localhost"
          fi

      - name: Run Ollama smoke tests
        # Live integration suite (tests/test_ollama_integration.py) — verifies
        # localhost reachable, model present on every healthy backend, sticky
        # pool weighted 2:1 with both online (collapses to localhost-only when
        # .69 is offline — that's a skip, not a fail), and cross-backend
        # overlap during fan-out. Runs only here on the self-hosted Mac
        # (where Ollama lives); the GitHub-hosted Ubuntu Tests job filters
        # smoke out via -m "not smoke".
        # Fails fast: if the local Ollama or routing layer is broken there's
        # no point burning 2 h on Scrape + Enrich. The earlier diagnostic
        # step (above) is already in the log to root-cause from.
        if: env.WITH_LLM == 'true'
        timeout-minutes: 5
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          .venv/bin/pip install -q pytest
          .venv/bin/pytest tests/test_ollama_integration.py -m smoke -v --tb=short

      - name: Scrape
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Per-step timeout caps how long scrape can monopolise the budget.
        # If LLM is the bottleneck and the inline pipeline backs up, the
        # step gets SIGTERM'd at 90 min — cli._sigterm_handler drains the
        # queue and saves what's enriched. Anything still pending is
        # finished by the next step (`Enrich with LLM`), which now has its
        # own 90-min slice instead of competing for the same 4h pool.
        # Deep sweep walks all 200 pages instead of ~30, so we extend the
        # cap to 150 min on its dedicated cron.
        timeout-minutes: ${{ env.IS_DEEP == 'true' && 150 || 90 }}
        # scrape auto-detects Ollama: if reachable → inline LLM enrichment,
        # otherwise saves raw. When with_llm=false the previous step doesn't
        # start Ollama, so this naturally falls back to raw-only.
        # Bump fd limit: the macOS self-hosted runner is launched with the
        # default 256 soft cap, which httpx connection pools (concurrency=5
        # × OLX + SV + Ollama keep-alive) + SQLite saturate around the
        # 90-min mark — every new socket then EAGAINs and the step burns
        # the rest of its budget on `Resource temporarily unavailable`
        # warnings without making progress. 4096 is well under the host's
        # `kern.maxfilesperproc=32768` ceiling.
        run: |
          ulimit -n 4096
          if [ "$IS_DEEP" = "true" ]; then
            echo "🔍 DEEP SWEEP — walking every page, skipping detail-fetch on known olx_ids"
            .venv/bin/python -m src.cli scrape --deep
          else
            .venv/bin/python -m src.cli scrape
          fi

      - name: Enrich with LLM
        # Runs on success or scrape-side failure (timeout, exception) —
        # NOT on cancellation. Cancellation means the concurrency rule
        # killed us so a fresher run could start; spinning up enrich
        # against a half-written DB just creates lock contention with
        # the next run. With success() || failure() it still recovers
        # from real scrape crashes that left llm_extras=NULL behind.
        if: ${{ env.WITH_LLM == 'true' && (success() || failure()) }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 90
        run: |
          ulimit -n 4096
          .venv/bin/python -m src.cli enrich --workers 6 --active-only

      - name: Backfill seller profiles
        # Resolves seller_uuid for newly-scraped listings (which only have
        # seller_profile_url at this point) and refreshes any seller row
        # whose profile_fetched_at is older than 14 days. Steady state
        # after the initial 1278-profile bootstrap: ~10-50 new profiles
        # per cron + a slow trickle of refreshes. Cheap (~1s/profile via
        # OlxScraper's throttle-aware client) so 15-min timeout has wide
        # headroom.
        #
        # Must run before train-model so seller_listings_count_90d /
        # seller_pseudoprivate / seller_cars_count are populated when the
        # price model rebuilds. continue-on-error: a flaky OLX day
        # shouldn't block the rest of the cron.
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 15
        continue-on-error: true
        run: |
          .venv/bin/python -m scripts.backfill_sellers --ttl-days 14 --progress-every 100

      - name: Verify photos with damage classifier
        # Runs the v2 ResNet50 classifier on listings' photos and stores
        # photo_damage_p in llm_extras. Photo signal feeds the alerts
        # step's _blocking_deal_reason — so this MUST run before alerts.
        # No --limit: SQL ORDER BY puts text-flagged (damage_severity≥2 or
        # desc_mentions_accident) listings first, so the high-signal rows
        # always finish even if the step's 90 min cap kicks in mid-batch.
        # Steady state (after backlog drains) only adds ~50-200 photo
        # checks per cron, well under the timeout.
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 90
        continue-on-error: true
        run: |
          ulimit -n 4096
          if [ ! -f data/damage_classifier_v2.pt ]; then
            echo "::warning::Skipping verify-photos — weights missing"
            exit 0
          fi
          .venv/bin/python -m src.cli verify-photos

      - name: Wait for background plate-OCR backfill
        # Backfill was kicked off right after venv setup and has been
        # running concurrently with Scrape / Enrich / Backfill sellers /
        # Verify photos. By the time we hit this step, the ~7-min job is
        # almost always done — this just collects the log and surfaces
        # the exit code. Polls on the PID instead of `wait` because the
        # process was started from a different shell session (GHA step).
        # Fallback to synchronous run only if no background job is
        # tracked (kickoff was skipped for missing weights, then weights
        # appeared somehow) — preserves the old behavior as a safety net.
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 30
        continue-on-error: true
        run: |
          if [ -f /tmp/plate_backfill.pid ]; then
            PID=$(cat /tmp/plate_backfill.pid)
            while kill -0 "$PID" 2>/dev/null; do sleep 5; done
            echo "===== background plate-OCR output ====="
            cat /tmp/plate_backfill.log 2>/dev/null || echo "(no log captured)"
            RC=$(cat /tmp/plate_backfill.rc 2>/dev/null || echo "?")
            echo "===== plate-OCR rc=$RC ====="
            rm -f /tmp/plate_backfill.pid /tmp/plate_backfill.rc /tmp/plate_backfill.log
            if [ "$RC" != "0" ]; then
              echo "::warning::plate-OCR backfill failed (rc=$RC)"
            fi
          elif [ -f data/damage_classifier_v2.pt ]; then
            ulimit -n 4096
            .venv/bin/python -m src.cli verify-photos --backfill-plates --workers 2 --limit 200
          else
            echo "Skipping plate-OCR — weights missing and no background job ran"
          fi

      - name: Send Telegram alerts
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Internal retry envelope is ~8 min (src/alerts/telegram_bot.py
        # _REFRESH_RETRY_*), sized to outlast the scrape worker's 3-5 min
        # market_stats lock. Step timeout must exceed that envelope with
        # buffer for the non-retry work, otherwise Actions kills the
        # process mid-retry (see retry 4/12 timeouts in old runs).
        timeout-minutes: 10
        run: .venv/bin/python -m src.cli alerts

      - name: Checkpoint WAL
        if: always()
        timeout-minutes: 5
        run: |
          sqlite3 data/olx_cars.db "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null || \
            .venv/bin/python -c "import sqlite3; sqlite3.connect('data/olx_cars.db').execute('PRAGMA wal_checkpoint(TRUNCATE)')"

      - name: Train price model + time-aware backtest
        # Both commands read the same DB but write disjoint files
        # (price_model.joblib + metrics vs price_backtest.json), so we
        # run them in parallel. train-model is the critical one — if it
        # fails, downstream predicted_price is empty and the upload step
        # would otherwise re-publish the stale on-disk bundle (which is
        # how a schema-mismatched model lived on a self-hosted runner
        # for weeks unnoticed). Backtest is best-effort: a failure there
        # only loses one dashboard panel.
        id: train_model
        if: ${{ !cancelled() }}
        timeout-minutes: 35
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          .venv/bin/python -m src.cli train-model > /tmp/train.log 2>&1 &
          TRAIN_PID=$!
          .venv/bin/python -m src.cli eval-model --time-backtest --splits 5 > /tmp/backtest.log 2>&1 &
          BT_PID=$!
          wait $TRAIN_PID
          TRAIN_RC=$?
          wait $BT_PID
          BT_RC=$?
          echo "===== train-model (rc=$TRAIN_RC) ====="
          cat /tmp/train.log
          echo "===== eval-model time-backtest (rc=$BT_RC) ====="
          cat /tmp/backtest.log
          if [ $BT_RC -ne 0 ]; then echo "::warning::eval-model failed (rc=$BT_RC) — non-fatal"; fi
          # Surface to the upload step so we don't re-publish a stale
          # bundle when training failed.
          echo "train_rc=$TRAIN_RC" >> "$GITHUB_OUTPUT"
          if [ $TRAIN_RC -ne 0 ]; then
            echo "::error::train-model failed (rc=$TRAIN_RC) — see log above"
            exit $TRAIN_RC
          fi

      - name: Train anomaly + hazard + detect re-listings
        # Three downstream signals that all consume the price_model
        # output. They run in parallel after train_model finishes —
        # any one failing is best-effort: dashboard degrades to "no
        # signal" rather than blocking the build. Re-listing detection
        # is independent of the price model but cheap enough to bundle
        # here so we get one daily refresh of all three together.
        id: train_aux_models
        if: ${{ !cancelled() && steps.train_model.outputs.train_rc == '0' }}
        timeout-minutes: 20
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          .venv/bin/python -m src.cli train-anomaly       > /tmp/anomaly.log 2>&1 &
          ANOM_PID=$!
          .venv/bin/python -m src.cli train-hazard        > /tmp/hazard.log 2>&1 &
          HAZ_PID=$!
          .venv/bin/python -m scripts.detect_relists      > /tmp/relists.log 2>&1 &
          REL_PID=$!
          wait $ANOM_PID; ANOM_RC=$?
          wait $HAZ_PID;  HAZ_RC=$?
          wait $REL_PID;  REL_RC=$?
          echo "===== train-anomaly (rc=$ANOM_RC) ====="
          cat /tmp/anomaly.log
          echo "===== train-hazard (rc=$HAZ_RC) ====="
          cat /tmp/hazard.log
          echo "===== detect_relists (rc=$REL_RC) ====="
          cat /tmp/relists.log
          # Surface to the upload step so we don't re-publish a stale
          # bundle when training failed for one of the three.
          echo "anomaly_rc=$ANOM_RC" >> "$GITHUB_OUTPUT"
          echo "hazard_rc=$HAZ_RC"   >> "$GITHUB_OUTPUT"
          echo "relists_rc=$REL_RC"  >> "$GITHUB_OUTPUT"
          if [ $ANOM_RC -ne 0 ]; then echo "::warning::train-anomaly failed (rc=$ANOM_RC)"; fi
          if [ $HAZ_RC -ne 0 ];  then echo "::warning::train-hazard failed (rc=$HAZ_RC)";   fi
          if [ $REL_RC -ne 0 ];  then echo "::warning::detect_relists failed (rc=$REL_RC)"; fi

      - name: Verify fresh bundle is loadable
        # Last-mile contract check between save_model (just ran) and
        # load_model (what dashboard/alerts/eval-model use). If schema or
        # feature_names drift between writer and reader, load_model returns
        # None and downstream predicted_price silently goes empty — exactly
        # the 2026-04 regression we just fixed. Freshness window is tight
        # (1h) since the file was written seconds ago.
        if: ${{ !cancelled() && steps.train_model.outputs.train_rc == '0' }}
        timeout-minutes: 2
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          .venv/bin/python -c "
          from src.analytics.price_model import load_model, _SCHEMA_VERSION, _ALL_FEATURES
          import joblib, sys
          bundle = joblib.load('data/price_model.joblib')
          print(f'on-disk schema={bundle.get(\"schema_version\")}, n_features={len(bundle.get(\"feature_names\", []))}')
          print(f'code expects schema={_SCHEMA_VERSION}, n_features={len(_ALL_FEATURES)}')
          loaded = load_model(max_age_hours=1)
          if loaded is None:
              print('::error::load_model rejected the just-saved bundle — schema/feature contract broken')
              sys.exit(1)
          print('load_model accepted the fresh bundle')
          "

      - name: Build dashboard witnesses
        # Bakes predict_prices / TreeSHAP / anomaly / hazard / signals into
        # parquet+json artifacts under data/dashboard/. The browser dashboard
        # (stlite on CF Pages) fetches these at mount time instead of running
        # the LightGBM/sklearn inference in Pyodide — see commit 9c4f236 for
        # the full architecture. Gated on train_model success because empty
        # predictions break the deal feed; we'd rather keep yesterday's
        # release than publish a no-deal build.
        id: build_dashboard
        if: ${{ !cancelled() && steps.train_model.outputs.train_rc == '0' }}
        timeout-minutes: 10
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          .venv/bin/python scripts/build_dashboard_data.py
          ls -lh data/dashboard/

      - name: Upload DB + model to GitHub Releases
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
          # Only re-publish model artifacts if this run actually trained them.
          # Without this gate the self-hosted runner kept reuploading whatever
          # data/price_model.joblib happened to be on disk — including a
          # schema-mismatched bundle that was rejected by load_model and
          # zeroed out predicted_price downstream.
          TRAIN_RC: ${{ steps.train_model.outputs.train_rc }}
          ANOM_RC: ${{ steps.train_aux_models.outputs.anomaly_rc }}
          HAZ_RC: ${{ steps.train_aux_models.outputs.hazard_rc }}
        run: |
          gh release view latest-data 2>/dev/null || \
            gh release create latest-data \
              --title "Latest Data" \
              --notes "Auto-updated database + price model from scraper" \
              --latest=false
          gh release upload latest-data data/olx_cars.db --clobber
          if [ "$TRAIN_RC" = "0" ]; then
            [ -f data/price_model.joblib ]     && gh release upload latest-data data/price_model.joblib     --clobber || true
            [ -f data/price_metrics.json ]     && gh release upload latest-data data/price_metrics.json     --clobber || true
            [ -f data/price_importance.json ]          && gh release upload latest-data data/price_importance.json          --clobber || true
            [ -f data/price_grouped_importance.json ]  && gh release upload latest-data data/price_grouped_importance.json  --clobber || true
            [ -f data/price_shap_importance.json ]     && gh release upload latest-data data/price_shap_importance.json     --clobber || true
            [ -f data/price_backtest.json ]            && gh release upload latest-data data/price_backtest.json            --clobber || true
          else
            echo "::warning::Skipping model upload — train-model rc=${TRAIN_RC:-<unset>} (preserves last-known-good artifact in release)"
          fi
          # Auxiliary models (anomaly + hazard). Each gated on its own rc
          # so a failed anomaly run doesn't block hazard upload and vice
          # versa. Same preserve-last-known-good policy: skip the upload
          # if its rc is non-zero. Their metrics histories live in
          # separate JSON files alongside the bundles.
          if [ "$ANOM_RC" = "0" ]; then
            [ -f data/anomaly_model.joblib ]   && gh release upload latest-data data/anomaly_model.joblib   --clobber || true
            [ -f data/anomaly_metrics.json ]   && gh release upload latest-data data/anomaly_metrics.json   --clobber || true
          else
            echo "::warning::Skipping anomaly upload — train-anomaly rc=${ANOM_RC:-<unset>}"
          fi
          if [ "$HAZ_RC" = "0" ]; then
            [ -f data/hazard_model.joblib ]    && gh release upload latest-data data/hazard_model.joblib    --clobber || true
            [ -f data/hazard_metrics.json ]    && gh release upload latest-data data/hazard_metrics.json    --clobber || true
          else
            echo "::warning::Skipping hazard upload — train-hazard rc=${HAZ_RC:-<unset>}"
          fi
          # detect_relists writes directly to the SQLite DB
          # (relist_events table); no separate file to upload — it
          # rides the data/olx_cars.db release alongside everything else.

          # Dashboard witnesses — only re-publish if build_dashboard_data
          # succeeded. CF Pages serves the stlite bundle from a separate
          # static deploy and fetches these parquets at browser mount time;
          # the old set stays in the release as a fallback if today's
          # build flaked.
          if [ -d data/dashboard ] && [ -f data/dashboard/manifest.json ]; then
            for f in data/dashboard/*.parquet data/dashboard/*.json; do
              [ -f "$f" ] && gh release upload latest-data "$f" --clobber || true
            done
            echo "Uploaded dashboard witnesses ($(ls data/dashboard | wc -l | tr -d ' ') files)"
          else
            echo "::warning::Skipping dashboard witness upload — data/dashboard/manifest.json missing"
          fi
