name: Scrape OLX

on:
  schedule:
    # Every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC).
    # Each run completes in ~35-45 min on the self-hosted runner, so the
    # ~3h idle gap leaves room for manual verify-photos / enrich-llm
    # passes without contending for the SQLite write lock.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      with_llm:
        description: "Enable LLM enrichment (start Ollama, enrich inline + final pass)"
        type: boolean
        default: true

permissions:
  contents: write

# Schedule always runs with LLM; manual trigger respects the input.
env:
  WITH_LLM: ${{ github.event_name == 'schedule' && 'true' || inputs.with_llm }}

# Single-runner self-hosted setup — only one scrape can hold the SQLite DB
# at a time anyway, so we cancel any in-flight run when a new cron fires
# instead of letting them queue up. Without this, runs were piling up: a
# 6-hour scrape + 8-hour cron interval was barely making it; throw in any
# slowdown and queue depth grew unbounded (we saw queued runs waiting 20+
# hours).
concurrency:
  group: scrape-job
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: [self-hosted, olx-scraper]
    # Lowered from 720 → 240 (4h). With early-stop in scrape_all, the
    # steady-state run is ~20-30 minutes. 4h is generous for a slow LLM
    # day; anything beyond that is stuck.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Link persistent data directory
        run: |
          rm -rf data
          ln -s /Users/anastasia/olx-car-parser/data data

      - name: Set up Python venv
        run: |
          /opt/homebrew/bin/python3.14 -m venv .venv 2>/dev/null || true
          .venv/bin/pip install -q -e .

      - name: Ensure Ollama is running
        if: env.WITH_LLM == 'true'
        timeout-minutes: 5
        run: |
          # Settings.yaml points the runner at http://localhost:11434, so
          # any binding that includes 127.0.0.1 (default) works. We no
          # longer wrestle with OLLAMA_HOST=0.0.0.0 — see commit log: the
          # menu-bar app's launchd auto-relaunch lost env vars and the
          # DHCP-assigned IP drifted, both producing EHOSTUNREACH on the
          # old hardcoded 192.168.1.77 URL.
          DESIRED_PARALLEL=2
          launchctl setenv OLLAMA_NUM_PARALLEL "$DESIRED_PARALLEL"
          launchctl setenv OLLAMA_FLASH_ATTENTION 1

          NEEDS_RESTART=0
          if ! curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            NEEDS_RESTART=1
          else
            CURRENT=$(grep -o 'OLLAMA_NUM_PARALLEL:[0-9]*' /tmp/ollama.err.log 2>/dev/null | tail -1 | cut -d: -f2)
            if [ "$CURRENT" != "$DESIRED_PARALLEL" ]; then
              echo "Ollama NUM_PARALLEL=$CURRENT, want $DESIRED_PARALLEL — recycling"
              NEEDS_RESTART=1
            fi
          fi
          if [ "$NEEDS_RESTART" = "1" ]; then
            pkill -9 -f "Ollama.app" 2>/dev/null || true
            pkill -9 -f "ollama serve" 2>/dev/null || true
            sleep 3
            open -a /Applications/Ollama.app 2>/dev/null || true
            for i in $(seq 1 30); do
              curl -sf http://localhost:11434/api/tags >/dev/null 2>&1 && break
              sleep 1
            done
          fi
          if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            PARALLEL=$(grep -o 'OLLAMA_NUM_PARALLEL:[0-9]*' /tmp/ollama.err.log | tail -1 || echo "unknown")
            echo "Ollama is running ($PARALLEL)"
            curl -s http://localhost:11434/api/tags | python3 -c "import sys,json; tags=json.load(sys.stdin); print('Models:', [m['name'] for m in tags.get('models',[])])"
          else
            echo "::error::Ollama failed to start after 30s"
            exit 1
          fi

      - name: Probe LAN partner Ollama (192.168.1.69)
        # Diagnostic-only — sticky routing falls back to localhost if .69
        # is unreachable, so the build keeps moving. Logs the actual
        # network state so the next regression isn't a guessing game:
        # ifconfig (which IP we have on Wi-Fi), netstat -rn (do we have
        # a route to .69's subnet), arp (has .69 ever responded), and
        # finally a curl with verbose output. Runs BEFORE smoke so that
        # if smoke trips, the diagnostic data is already in the log.
        if: env.WITH_LLM == 'true'
        timeout-minutes: 2
        continue-on-error: true
        run: |
          echo "=== runner own IP ==="
          ipconfig getifaddr en0 2>/dev/null || true
          ipconfig getifaddr en1 2>/dev/null || true
          echo "=== route to 192.168.1.69 ==="
          route -n get 192.168.1.69 2>&1 | head -10 || true
          echo "=== ARP cache for 192.168.1.69 ==="
          arp -n 192.168.1.69 2>&1 || true
          echo "=== ping .69 ==="
          ping -c 2 -W 2000 192.168.1.69 2>&1 | head -8 || true
          echo "=== curl Ollama on .69 ==="
          if curl -sf --max-time 5 http://192.168.1.69:11434/api/tags >/dev/null 2>&1; then
            echo "✓ Ollama on 192.168.1.69:11434 reachable"
          else
            echo "::warning::192.168.1.69:11434 unreachable — enrich falls back to localhost"
          fi

      - name: Run Ollama smoke tests
        # Live integration suite (tests/test_ollama_integration.py) — verifies
        # localhost reachable, model present on every healthy backend, sticky
        # pool weighted 2:1 with both online (collapses to localhost-only when
        # .69 is offline — that's a skip, not a fail), and cross-backend
        # overlap during fan-out. Runs only here on the self-hosted Mac
        # (where Ollama lives); the GitHub-hosted Ubuntu Tests job filters
        # smoke out via -m "not smoke".
        # Fails fast: if the local Ollama or routing layer is broken there's
        # no point burning 2 h on Scrape + Enrich. The earlier diagnostic
        # step (above) is already in the log to root-cause from.
        if: env.WITH_LLM == 'true'
        timeout-minutes: 5
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          .venv/bin/pip install -q pytest
          .venv/bin/pytest tests/test_ollama_integration.py -m smoke -v --tb=short

      - name: Scrape
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Per-step timeout caps how long scrape can monopolise the budget.
        # If LLM is the bottleneck and the inline pipeline backs up, the
        # step gets SIGTERM'd at 90 min — cli._sigterm_handler drains the
        # queue and saves what's enriched. Anything still pending is
        # finished by the next step (`Enrich with LLM`), which now has its
        # own 90-min slice instead of competing for the same 4h pool.
        timeout-minutes: 90
        # scrape auto-detects Ollama: if reachable → inline LLM enrichment,
        # otherwise saves raw. When with_llm=false the previous step doesn't
        # start Ollama, so this naturally falls back to raw-only.
        # Bump fd limit: the macOS self-hosted runner is launched with the
        # default 256 soft cap, which httpx connection pools (concurrency=5
        # × OLX + SV + Ollama keep-alive) + SQLite saturate around the
        # 90-min mark — every new socket then EAGAINs and the step burns
        # the rest of its budget on `Resource temporarily unavailable`
        # warnings without making progress. 4096 is well under the host's
        # `kern.maxfilesperproc=32768` ceiling.
        run: |
          ulimit -n 4096
          .venv/bin/python -m src.cli scrape

      - name: Enrich with LLM
        # Runs on success or scrape-side failure (timeout, exception) —
        # NOT on cancellation. Cancellation means the concurrency rule
        # killed us so a fresher run could start; spinning up enrich
        # against a half-written DB just creates lock contention with
        # the next run. With success() || failure() it still recovers
        # from real scrape crashes that left llm_extras=NULL behind.
        if: ${{ env.WITH_LLM == 'true' && (success() || failure()) }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 90
        run: |
          ulimit -n 4096
          .venv/bin/python -m src.cli enrich --workers 6 --active-only

      - name: Ensure damage classifier weights present
        # Weights live in the persistent data/ dir alongside the DB.
        # First time on a fresh runner: pull them from the latest-data
        # release. Subsequent runs see the cached file and skip download.
        # If the release lacks the asset, the next step's weights check
        # will skip verify-photos with a warning.
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          if [ -f data/damage_classifier_v2.pt ]; then
            echo "Weights already present at data/damage_classifier_v2.pt"
          else
            gh release download latest-data --pattern damage_classifier_v2.pt --dir data/ \
              || echo "::warning::damage_classifier_v2.pt not in latest-data release; verify-photos will be skipped"
          fi

      - name: Verify photos with damage classifier
        # Runs the v2 ResNet50 classifier on listings' photos and stores
        # photo_damage_p in llm_extras. Photo signal feeds the alerts
        # step's _blocking_deal_reason — so this MUST run before alerts.
        # No --limit: SQL ORDER BY puts text-flagged (damage_severity≥2 or
        # desc_mentions_accident) listings first, so the high-signal rows
        # always finish even if the step's 90 min cap kicks in mid-batch.
        # Steady state (after backlog drains) only adds ~50-200 photo
        # checks per cron, well under the timeout.
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 90
        continue-on-error: true
        run: |
          ulimit -n 4096
          if [ ! -f data/damage_classifier_v2.pt ]; then
            echo "::warning::Skipping verify-photos — weights missing"
            exit 0
          fi
          .venv/bin/python -m src.cli verify-photos

      - name: Send Telegram alerts
        if: ${{ !cancelled() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        timeout-minutes: 5
        run: .venv/bin/python -m src.cli alerts

      - name: Checkpoint WAL
        if: always()
        timeout-minutes: 5
        run: |
          sqlite3 data/olx_cars.db "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null || \
            .venv/bin/python -c "import sqlite3; sqlite3.connect('data/olx_cars.db').execute('PRAGMA wal_checkpoint(TRUNCATE)')"

      - name: Train price model + time-aware backtest
        # Both commands read the same DB but write disjoint files
        # (price_model.joblib + metrics vs price_backtest.json), so we
        # run them in parallel. train-model is the critical one — if it
        # fails, downstream predicted_price is empty and the upload step
        # would otherwise re-publish the stale on-disk bundle (which is
        # how a schema-mismatched model lived on a self-hosted runner
        # for weeks unnoticed). Backtest is best-effort: a failure there
        # only loses one dashboard panel.
        id: train_model
        if: ${{ !cancelled() }}
        timeout-minutes: 35
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          .venv/bin/python -m src.cli train-model > /tmp/train.log 2>&1 &
          TRAIN_PID=$!
          .venv/bin/python -m src.cli eval-model --time-backtest --splits 5 > /tmp/backtest.log 2>&1 &
          BT_PID=$!
          wait $TRAIN_PID
          TRAIN_RC=$?
          wait $BT_PID
          BT_RC=$?
          echo "===== train-model (rc=$TRAIN_RC) ====="
          cat /tmp/train.log
          echo "===== eval-model time-backtest (rc=$BT_RC) ====="
          cat /tmp/backtest.log
          if [ $BT_RC -ne 0 ]; then echo "::warning::eval-model failed (rc=$BT_RC) — non-fatal"; fi
          # Surface to the upload step so we don't re-publish a stale
          # bundle when training failed.
          echo "train_rc=$TRAIN_RC" >> "$GITHUB_OUTPUT"
          if [ $TRAIN_RC -ne 0 ]; then
            echo "::error::train-model failed (rc=$TRAIN_RC) — see log above"
            exit $TRAIN_RC
          fi

      - name: Verify fresh bundle is loadable
        # Last-mile contract check between save_model (just ran) and
        # load_model (what dashboard/alerts/eval-model use). If schema or
        # feature_names drift between writer and reader, load_model returns
        # None and downstream predicted_price silently goes empty — exactly
        # the 2026-04 regression we just fixed. Freshness window is tight
        # (1h) since the file was written seconds ago.
        if: ${{ !cancelled() && steps.train_model.outputs.train_rc == '0' }}
        timeout-minutes: 2
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          .venv/bin/python -c "
          from src.analytics.price_model import load_model, _SCHEMA_VERSION, _ALL_FEATURES
          import joblib, sys
          bundle = joblib.load('data/price_model.joblib')
          print(f'on-disk schema={bundle.get(\"schema_version\")}, n_features={len(bundle.get(\"feature_names\", []))}')
          print(f'code expects schema={_SCHEMA_VERSION}, n_features={len(_ALL_FEATURES)}')
          loaded = load_model(max_age_hours=1)
          if loaded is None:
              print('::error::load_model rejected the just-saved bundle — schema/feature contract broken')
              sys.exit(1)
          print('load_model accepted the fresh bundle')
          "

      - name: Upload DB + model to GitHub Releases
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
          # Only re-publish model artifacts if this run actually trained them.
          # Without this gate the self-hosted runner kept reuploading whatever
          # data/price_model.joblib happened to be on disk — including a
          # schema-mismatched bundle that was rejected by load_model and
          # zeroed out predicted_price downstream.
          TRAIN_RC: ${{ steps.train_model.outputs.train_rc }}
        run: |
          gh release view latest-data 2>/dev/null || \
            gh release create latest-data \
              --title "Latest Data" \
              --notes "Auto-updated database + price model from scraper" \
              --latest=false
          gh release upload latest-data data/olx_cars.db --clobber
          if [ "$TRAIN_RC" = "0" ]; then
            [ -f data/price_model.joblib ]     && gh release upload latest-data data/price_model.joblib     --clobber || true
            [ -f data/price_metrics.json ]     && gh release upload latest-data data/price_metrics.json     --clobber || true
            [ -f data/price_importance.json ]  && gh release upload latest-data data/price_importance.json  --clobber || true
            [ -f data/price_backtest.json ]    && gh release upload latest-data data/price_backtest.json    --clobber || true
          else
            echo "::warning::Skipping model upload — train-model rc=${TRAIN_RC:-<unset>} (preserves last-known-good artifact in release)"
          fi
