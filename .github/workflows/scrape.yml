name: Scrape OLX

on:
  schedule:
    - cron: "0 6 * * *"        # daily at 06:00 UTC
  workflow_dispatch:             # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: [self-hosted, olx-scraper]
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Link persistent data directory
        run: |
          rm -rf data
          ln -s /Users/anastasia/olx-car-parser/data data

      - name: Set up Python venv
        run: |
          /opt/homebrew/bin/python3.11 -m venv .venv 2>/dev/null || true
          .venv/bin/pip install -q -r requirements.txt

      - name: Ensure Ollama is running
        run: |
          if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            echo "Ollama is running"
            curl -s http://localhost:11434/api/tags | python3 -c "import sys,json; tags=json.load(sys.stdin); print('Models:', [m['name'] for m in tags.get('models',[])])"
          else
            echo "WARNING: Ollama not running. LLM enrichment will fall back to OpenRouter."
          fi

      - name: Run scraper
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: .venv/bin/python -m src.cli scrape

      - name: Send Telegram alerts
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: .venv/bin/python -m src.cli alerts

      - name: Checkpoint WAL
        run: |
          sqlite3 data/olx_cars.db "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null || \
            .venv/bin/python -c "import sqlite3; sqlite3.connect('data/olx_cars.db').execute('PRAGMA wal_checkpoint(TRUNCATE)')"

      - name: Upload DB to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          gh release view latest-data 2>/dev/null || \
            gh release create latest-data \
              --title "Latest Data" \
              --notes "Auto-updated database from scraper" \
              --latest=false
          gh release upload latest-data data/olx_cars.db --clobber
