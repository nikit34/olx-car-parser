name: Tests

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 7 * * *"     # full suite daily at 07:00 UTC
    - cron: "0 */6 * * *"   # smoke every 6 hours

jobs:
  test-full:
    if: github.event_name == 'push' || github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run all tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pytest tests/ -v --tb=short

  test-smoke:
    if: github.event.schedule == '0 */6 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run smoke tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pytest tests/test_smoke_apis.py -v --tb=short -m smoke
